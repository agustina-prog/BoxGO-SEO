    <header class="p-5">
        <h1>Servicios que brindamos</h1>
        <h2>En BoxGO, ofrecemos soluciones logísticas integrales para garantizar que tus compras lleguen de forma eficiente y segura.</h2>
    </header>
    <main>
        <section class="como-comprar container-fluid p-3 mb-5">
            <div class="row justify-content-center">
            <figure  class="col-md-4 mis-cards m-2 p-4">
                <img src="../img/icons/avion.svg" alt="Icono de un avion representando el transporte aereo">
                <figcaption>Transporte aereo</figcaption>
                <p>Servicios de transporte aéreo para envíos, con una red global de aerolíneas para asegurar rapidez y seguridad.</p>
            </figure>
            <figure  class="col-md-4 mis-cards m-2 p-4" >
                <img src="../img/icons/aduana.svg" alt="Icono con tilde representand la gestion aduanera">
                <figcaption>Gestion aduanero</figcaption>
                <p>Expertos en trámites aduaneros y cumplimiento normativo para facilitar el despacho de sus mercancías, minimizando retrasos y costos adicionales.</p>
            </figure>
            <figure class="col-md-4 mis-cards m-2 p-4" >
                <img src="../img/icons/movilizacion.svg" alt="icono de una ubicacion con una flechar representando la movilizacion de los paquetes">
                <figcaption>Almacenamiento y Distribución</figcaption>
                <p>Soluciones de almacenamiento seguras y estratégicamente ubicadas, con servicios de picking, packing y distribución para optimizar su cadena de suministro.</p>
            </figure>
            <figure  class="col-md-4 mis-cards m-2 p-4">
                <img src="../img/icons/seguro.svg" alt="icono de una llave representando el seguro de carga">
                <figcaption>Seguro de Carga</figcaption>
                <p>Proteja sus mercancías con nuestras opciones de seguro de carga, brindando tranquilidad ante cualquier imprevisto durante el transporte.</p>
            </figure>
